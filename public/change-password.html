<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- TOP NAV BAR -->
  <header class="top-bar">
    <div class="top-bar-left">
      <h1 class="app-title">NHS Safety App</h1>
    </div>

    <div class="top-bar-right nav-buttons">
      <button onclick="window.location.href='menu.html'" class="btn btn-outline">Menu</button>
      <button id="logoutBtn" class="btn btn-outline">Logout</button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <div class="page-container">
    <div class="card">
      <h2>Change Password</h2>

      <label>Current Password</label>
      <input type="password" id="oldPassword" class="input">

      <label>New Password</label>
      <input type="password" id="newPassword" class="input">

      <div class="button-row">
        <button id="saveBtn" class="btn btn-primary">Save</button>
        <button onclick="window.location.href='menu.html'" class="btn btn-outline">Cancel</button>
      </div>

      <p id="msg" class="status-message"></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="change-password.js"></script>
</body>
</html>
