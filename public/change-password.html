<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="app">

    <div class="header">
      <div>
        <p class="header-title">Change Password</p>
        <p class="header-subtitle">Update your account security</p>
      </div>

      <div class="header-actions nav-buttons">
        <button id="menuBtn" class="btn btn-outline">Menu</button>
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>
    </div>

    <div class="form-card">

      <div class="form-row">
        <label for="oldPassword">Current password</label>
        <input type="password" id="oldPassword">
      </div>

      <div class="form-row">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword">
      </div>

      <div class="form-row">
        <label for="confirmPassword">Confirm new password</label>
        <input type="password" id="confirmPassword">
      </div>

      <button id="savePasswordBtn" class="btn btn-primary">Save new password</button>

    </div>

  </div>

  <script src="app.js"></script>
  <script src="change-password.js"></script>

</body>
</html>
