<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Change Password</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <div class="header">
    <div>
      <p class="header-title">Change Password</p>
      <p class="header-subtitle">Update your account security</p>
    </div>
  </div>

  <div class="form-card">
    <div class="form-row">
      <label>Current password</label>
      <input type="password" id="oldPassword">
    </div>

    <div class="form-row">
      <label>New password</label>
      <input type="password" id="newPassword">
    </div>

    <div class="form-row">
      <label>Confirm new password</label>
      <input type="password" id="confirmPassword">
    </div>

    <button id="savePasswordBtn" class="btn btn-primary">Save new password</button>
  </div>

</div>

<script src="app.js"></script>
<script src="change-password.js"></script>

</body>
</html>
