<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="app">
  <!-- TOP NAV BAR (identical structure to other pages) -->
    <div class="header">
      <div>
        <p class="header-title">Early Intervention in Psychosis Halton/Warrington Safety App</p>
        <p class="header-subtitle" id="headerSubtitle">Main Menu</p>
      </div>
      <div class="header-actions nav-buttons">
        <button id="menuBtn" class="btn btn-outline">Menu</button>
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>
    </div>

  <!-- MAIN CONTENT -->
  <div class="page-container">
    <div class="card">
      <h2>Change Password</h2>

      <label>Current Password</label>
      <input type="password" id="oldPassword" class="input">

      <label>New Password</label>
      <input type="password" id="newPassword" class="input">

      <div class="button-row">
        <button id="saveBtn" class="btn btn-primary">Save</button>
        <button onclick="window.location.href='menu.html'" class="btn btn-cancel">Cancel</button>
      </div>

      <p id="msg" class="status-message"></p>
    </div>
  </div>
  </div>

  <script src="app.js"></script>
  <script src="change-password.js"></script>
</body>
</html>
