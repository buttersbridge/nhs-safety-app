<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Duty Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- HEADER -->
    <div class="header">
      <div>
        <p class="header-title">Early Intervention in Psychosis Halton/Warrington Safety App</p>
        <p class="header-subtitle" id="headerSubtitle">Duty Dashboard</p>
      </div>

      <div class="header-actions nav-buttons">
        <button id="menuBtn" class="btn btn-outline">Menu</button>
        <button id="dutyBtn" class="btn btn-outline">Duty</button>
        <button id="managerBtn" class="btn btn-outline">Manager</button>
        <button id="logoutBtn" class="btn btn-outline">Logout</button>
      </div>
    </div>

    <!-- MAIN SECTION -->
    <div class="section">
      <p class="section-title">Today's visits</p>
      <p class="section-subtitle">Monitor visit status and identify overdue contacts.</p>

      <!-- LEGEND -->
      <div class="legend">
        <div class="legend-item">
          <span class="legend-box legend-blue"></span> Current visit
        </div>
        <div class="legend-item">
          <span class="legend-box legend-orange"></span> Overdue (&lt; 30 mins)
        </div>
        <div class="legend-item">
          <span class="legend-box legend-red"></span> Overdue (≥ 30 mins)
        </div>
        <div class="legend-item">
          <span class="legend-box legend-highrisk"></span> High‑risk overdue (blinking)
        </div>
        <div class="legend-item">
          <span class="legend-box legend-green"></span> Checked‑in safe
        </div>
      </div>

      <!-- DATE PICKER -->
      <div class="controls-row">
        <label>
          Date:
          <input type="date" id="dutyDate">
        </label>
      </div>

      <!-- TIMELINE -->
      <div id="timeline" class="timeline"></div>
    </div>

  </div>

<!-- SCRIPTS -->
<script src="app.js"></script>

<script>
  const u = getUser();
  if (!u) {
    window.location.href = "index.html";
  }

  document.getElementById("headerSubtitle").textContent =
    `Duty view (${u.name || u.email})`;

  document.getElementById("logoutBtn").onclick = () => {
    localStorage.removeItem("user");
    window.location.href = "index.html";
  };

  document.getElementById("menuBtn").onclick = () => {
    window.location.href = "menu.html";
  };

  document.getElementById("dutyBtn").onclick = () => {
    window.location.href = "duty.html";
  };

  document.getElementById("managerBtn").onclick = () => {
    if (u.role !== "manager") {
      alert("Current user doesn't have these permissions");
      return;
    }
    window.location.href = "manager.html";
  };
</script>

<!-- IMPORTANT: duty.js MUST be last -->
<script src="duty.js"></script>
</body>
</html>
